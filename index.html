<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>be Solve System - Конструктор</title>
    <style>
        :root {
            --primary: #ff00ff;
            --bg: #0a0a0a;
            --card: #000;
            --text: #fff;
            --wa: #25D366;
            --tg: #0088cc;
            --vk: #0077ff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .builder-card {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(255,0,255,0.2);
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            margin: 0;
            font-weight: 900;
        }

        .sub-title {
            text-align: center;
            color: var(--primary);
            font-size: 12px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .preview-box {
            height: 100px;
            background: #050505;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid #222;
        }

        .muffler-body {
            background: linear-gradient(180deg, #444, #111, #000);
            border: 1px solid var(--primary);
            transition: 0.3s;
        }

        .pipe {
            position: absolute;
            width: 30px;
            height: 14px;
            background: #333;
            top: 50%;
            transform: translateY(-50%);
        }

        .pipe-in {
            left: 0;
        }

        .pipe-out {
            right: 0;
        }

        .label-text {
            display: block;
            margin: 10px 0 5px;
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            font-weight: bold;
        }

        input, input[type="tel"], select {
            width: 100%;
            background: #111;
            color: #fff;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 5px;
        }

            input[type="range"] {
                width: 100%;
                height: 6px;
                appearance: none;
                background: #222;
                margin: 15px 0;
            }

                input[type="range"]::-webkit-slider-thumb {
                    appearance: none;
                    width: 20px;
                    height: 20px;
                    background: var(--primary);
                    border-radius: 50%;
                    cursor: pointer;
                }

        .price-tag {
            text-align: center;
            margin: 15px 0;
            padding: 15px;
            background: rgba(255,0,255,0.05);
            border: 1px dashed var(--primary);
        }

        .price-value {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
        }

        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 15px 5px;
            border: none;
            color: #fff;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-wa {
            background: var(--wa);
        }

        .btn-tg {
            background: var(--tg);
        }

        .btn-vk {
            background: var(--vk);
            width: 100%;
        }

        .btn:hover {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="builder-card">
        <h2>be Solve System</h2>
        <div class="sub-title">Exhaust Constructor</div>

        <div class="preview-box">
            <div class="pipe pipe-in"></div>
            <div id="visualBody" class="muffler-body"></div>
            <div class="pipe pipe-out"></div>
        </div>

        <span class="label-text">Имя и Телефон</span>
        <input type="text" id="userName" placeholder="Ваше имя">
        <input type="tel" id="userPhone" placeholder="Ваш телефон">

        <span class="label-text">Тип изделия</span>
        <select id="productSelect" onchange="resetSlider()"></select>

        <span class="label-text" id="lengthLabel">Длина: 250 мм</span>
        <input type="range" id="lengthSlider" step="50" oninput="update()">

        <div class="price-tag">
            <div class="price-value" id="priceDisplay">0 ₽</div>
        </div>

        <div class="buttons-grid">
            <div class="social-row">
                <button class="btn btn-wa" onclick="send('wa')">WhatsApp</button>
                <button class="btn btn-tg" onclick="send('tg')">Telegram</button>
            </div>
            <button class="btn btn-vk" onclick="send('vk')">ВКонтакте</button>
        </div>
    </div>

    <script>
        const products = {
            round170: { name: 'Круглый D170', baseP: 11300, minL: 200, maxL: 550, stepP: 700, h: 55, r: 27 },
            round100: { name: 'Резонатор D100', baseP: 6300, minL: 200, maxL: 550, stepP: 700, h: 30, r: 15 },
            ovalCC: { name: 'Овальный C-C', baseP: 18100, minL: 250, maxL: 550, stepP: 700, h: 60, r: 15 },
            ovalH: { name: 'Овальный H', baseP: 25400, minL: 250, maxL: 550, stepP: 800, h: 65, r: 15 },
            ovalU: { name: 'Овальный U', baseP: 25700, minL: 250, maxL: 550, stepP: 800, h: 60, r: 15 },
            ovalL: { name: 'Овальный L', baseP: 28300, minL: 250, maxL: 550, stepP: 700, h: 60, r: 15 }
        };

        const select = document.getElementById('productSelect');
        const slider = document.getElementById('lengthSlider');
        const label = document.getElementById('lengthLabel');
        const priceDisplay = document.getElementById('priceDisplay');
        const visual = document.getElementById('visualBody');

        for (let key in products) {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerText = products[key].name;
            select.appendChild(opt);
        }

        function resetSlider() { slider.value = products[select.value].minL; update(); }

        function update() {
            const p = products[select.value];
            slider.min = p.minL; slider.max = p.maxL;
            const val = parseInt(slider.value);
            label.innerText = `Длина корпуса: ${val} мм`;
            const extraSteps = (val - p.minL) / 50;
            const total = p.baseP + (extraSteps * p.stepP);
            priceDisplay.innerText = total.toLocaleString() + ' ₽';
            visual.style.width = (val * 0.4) + 'px';
            visual.style.height = p.h + 'px';
            visual.style.borderRadius = p.r + 'px';
        }

        function send(type) {
            const p = products[select.value];
            const name = document.getElementById('userName').value || "Не указано";
            const phone = document.getElementById('userPhone').value || "Не указано";
            const msg = `ЗАКАЗ be Solve System:\n👤 Клиент: ${name}\n📞 Тел: ${phone}\n🛠 Изделие: ${p.name}\n📏 Длина: ${slider.value} мм\n💰 Цена: ${priceDisplay.innerText}`;
            const encoded = encodeURIComponent(msg);

            let url = "";
            if (type === 'wa') url = `https://wa.me/79221714919`;
            if (type === 'tg') url = `https://t.me/be_solve_system`;
            if (type === 'vk') url = `https://vk.com/write-227779041`;

            // ИСПОЛЬЗУЕМ ПРЯМОЙ ПЕРЕХОД ДЛЯ ОБХОДА БЛОКИРОВКИ
            window.location.href = url;
        }

        update();
    </script>
</body>
</html>
